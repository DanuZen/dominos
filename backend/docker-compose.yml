version: '3.8'

services:
  db:
    image: postgres:15
    container_name: domino_postgres
    restart: always
    environment:
      POSTGRES_USER: domino_user
      POSTGRES_PASSWORD: domino_password
      POSTGRES_DB: domino_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: domino_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
