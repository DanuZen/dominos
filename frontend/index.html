<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Web Domino Tournament Game — Neo-Brutalist, Mode Single Player & Multiplayer Online." />
    <title>DOMINO TURNAMEN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0a1024;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        font-family: 'Space Grotesk', sans-serif;
        touch-action: none;
        overscroll-behavior: none;
        user-select: none;
        -webkit-user-select: none;
      }
      #game-container {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #game-container canvas {
        display: block;
      }
      #rotate-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: #0a1024;
        z-index: 9999;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: #fff;
        text-align: center;
        padding: 20px;
      }
      #rotate-overlay svg {
        width: 80px; height: 80px; margin-bottom: 20px;
        animation: rotatePhone 2s ease-in-out infinite;
      }
      @keyframes rotatePhone {
        0% { transform: rotate(0deg); }
        50% { transform: rotate(-90deg); }
        100% { transform: rotate(-90deg); }
      }
      @media screen and (orientation: portrait) and (max-width: 768px) {
        #rotate-overlay { display: flex; }
        #game-container { display: none; }
      }
    </style>
  </head>
  <body>
    <div id="rotate-overlay">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
        <line x1="12" y1="18" x2="12.01" y2="18"></line>
      </svg>
      <h2>Putar Perangkat Anda</h2>
      <p style="margin-top: 10px; color: #888;">Game ini dirancang untuk dimainkan dalam mode Lanskap.</p>
    </div>
    <div id="game-container"></div>
    <!-- Fullscreen Button -->
    <button id="fs-btn" style="position:fixed; top:10px; right:10px; background:rgba(255,255,255,0.1); border:none; padding:10px; border-radius:8px; cursor:pointer; z-index:9000; color:#fff;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
    </button>
    <script type="module" src="/src/main.ts"></script>
    <script>
      const fsBtn = document.getElementById('fs-btn');
      fsBtn.addEventListener('click', () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(err => console.log(err));
        } else {
          document.exitFullscreen();
        }
      });
      document.addEventListener('fullscreenchange', () => {
        fsBtn.style.display = document.fullscreenElement ? 'none' : 'block';
      });
    </script>
  </body>
</html>
